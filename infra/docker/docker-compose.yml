name: at72-verse-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: at72-verse-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verse}
      POSTGRES_DB: ${POSTGRES_DB:-verse}
    volumes:
      - at72_verse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verse} -d ${POSTGRES_DB:-verse}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: at72-verse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - at72_verse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: at72-verse-minio
    profiles: ["minio"]
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-verse_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-verse_minio_secret}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - at72_verse_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Phase 30 — observability profile (EA2-A)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: at72-verse-otel-collector
    profiles: ["observability"]
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
    depends_on:
      - tempo
      - prometheus

  tempo:
    image: grafana/tempo:2.4.1
    container_name: at72-verse-tempo
    profiles: ["observability"]
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - at72_verse_tempo_data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: at72-verse-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - at72_verse_prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: at72-verse-grafana
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - at72_verse_grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    depends_on:
      - prometheus
      - tempo

volumes:
  at72_verse_pg_data:
  at72_verse_redis_data:
  at72_verse_minio_data:
  at72_verse_prometheus_data:
  at72_verse_grafana_data:
  at72_verse_tempo_data:
