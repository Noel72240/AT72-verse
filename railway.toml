# Railway — Nest API (monorepo)
[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile.api"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Apply schema before the new replica takes traffic
preDeployCommand = ["pnpm --filter @at72-verse/db migrate:deploy"]
