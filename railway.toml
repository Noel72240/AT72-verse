# Railway — Nest API (monorepo)
[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile.api"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Runs inside the Docker image (migrate then Nest). Safe now that DATABASE_URL=Neon.
startCommand = "/api-entrypoint.sh"
